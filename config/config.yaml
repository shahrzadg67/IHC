# Configuration for the IF cell-segmentation / quantification pipeline (M1: Stage 0 + Stage 1).
# Config-driven by design: no hard-coded paths or thresholds in the source.

# ---------------------------------------------------------------------------
# Paths (raw TIFFs are read-only and NOT copied; we point at the source folder)
# ---------------------------------------------------------------------------
paths:
  raw_dir: "/hpf/projects/msalter/sghazis/Imaging/ED/For Shahrzad"  # original TIFFs (read-only)
  manifest: "data/manifest.csv"       # generated by Stage 0, human-reviewable
  gray_dir: "outputs/gray"            # Stage 1 grayscale outputs: {field_id}__{marker}.tif
  qc_dir: "outputs/qc"               # Stage 1 per-field QC contact sheets
  masks_dir: "outputs/masks"          # Stage 3/4 label masks: {field_id}__nuclei.tif / __cells.tif
  qc_seg_dir: "outputs/qc_seg"        # Stage 3/4 segmentation QC overlays (PNG)

# ---------------------------------------------------------------------------
# Input mode. Only `rgb_export` is implemented in M1 (the current 8-bit exports).
# `single_channel` / `ome_tiff` (raw 16-bit path) are stubbed for M6.
# ---------------------------------------------------------------------------
input_mode: rgb_export      # rgb_export | single_channel | ome_tiff

# ---------------------------------------------------------------------------
# Pixel size (um/px) per magnification. UNKNOWN for the current 8-bit exports
# (no embedded metadata) -> null. Fill in from acquisition metadata / a
# calibration slide before reporting density in mm^2 or distances in um (plan Sec.7 Q2).
# ---------------------------------------------------------------------------
pixel_size_um:
  20x: null
  40x: null

# ---------------------------------------------------------------------------
# Marker alias map: raw filename token (case-insensitive) -> canonical marker name.
# Canonical names are filesystem-safe (F4-80, not F4/80). `overlay` is a display-only role.
# ---------------------------------------------------------------------------
marker_aliases:
  dapi: DAPI
  cd11c: CD11c
  cd207: CD207
  syk: SYK
  f480: F4-80
  f4-80: F4-80
  "pgp9.5": PGP9.5
  pgp95: PGP9.5
  # overlay/merge display files -> role=overlay (excluded from quantification)
  overlay: overlay
  6_overlay: overlay
  merge: overlay

# Any canonical marker in this list is treated as a display-only overlay (exclude=True).
overlay_markers: [overlay]

# The universal nuclear segmentation anchor (must appear exactly once per field).
nuclear_marker: DAPI

# ---------------------------------------------------------------------------
# Panel definitions (documentation + validation of expected markers per field).
# ---------------------------------------------------------------------------
panels:
  A:  # dendritic / Langerhans focus
    match_prefix_regex: '^\d{4}-\d{2}-\d{2}_'   # date-prefixed filenames
    sample_label: CFA
    expected_markers: [DAPI, CD11c, CD207, SYK]
  B:  # macrophage + nerve focus
    match_prefix_regex: '^CFA\s'
    expected_markers: [DAPI, F4-80, PGP9.5, SYK]

# ---------------------------------------------------------------------------
# Channel-stats sampling (dominant-channel detection). Sample every Nth pixel
# for speed; a channel counts as "populated" if its mean >= frac * max-channel-mean.
# ---------------------------------------------------------------------------
channel_stats:
  sample_step: 4        # subsample stride (pixels) when estimating channel means
  populated_frac: 0.4   # threshold vs dominant channel to call a channel "populated"

# ---------------------------------------------------------------------------
# Stage 3 — nuclear segmentation (Cellpose-SAM on DAPI).
# `pretrained_model: null` uses Cellpose-SAM's built-in default model (cpsam).
# Set an explicit name/path to override (e.g. a fine-tuned model) once available.
# ---------------------------------------------------------------------------
segmentation:
  pretrained_model: null      # null -> default Cellpose-SAM (cpsam); or a model name/path
  gpu: true                   # use GPU (required for practical speed; falls back to CPU if absent)
  diameter: null              # null -> let Cellpose-SAM auto-scale (it is diameter-robust)
  flow_threshold: 0.4         # higher = more permissive on flow error
  cellprob_threshold: 0.0     # lower = more (dimmer) cells kept
  normalize: true             # per-image intensity normalization before inference
  min_size: 15                # drop nucleus masks smaller than this many pixels
  batch_size: 8               # inference batch (tune to GPU memory)

# ---------------------------------------------------------------------------
# Stage 4 — cell-body approximation by expanding nuclei (no membrane marker).
# Distance is in PIXELS and magnification-dependent; revisit once pixel size is
# known (plan Sec.7 Q2) so the expansion maps to a sensible micron distance.
# ---------------------------------------------------------------------------
cell_expansion:
  distance_px:
    20x: 4
    40x: 6

# ---------------------------------------------------------------------------
# Stage 5 — per-cell feature extraction.
# `compartment` selects which mask marker intensities are measured in:
#   cell    = expanded cell body (Stage 4) — good for surface markers (F4-80, CD11c)
#   nucleus = nucleus mask (Stage 3)       — good for nuclear signal
# (Per-marker compartments can be refined later; global default for now — plan Sec.7 Q4.)
# ---------------------------------------------------------------------------
features:
  compartment: cell

# Fiber-like markers are quantified as area/coverage (Stage 8), NOT as per-cell objects,
# so they are excluded from per-cell positivity (Stage 6) and phenotyping (Stage 7).
fiber_markers: [PGP9.5]

# ---------------------------------------------------------------------------
# Stage 6 — marker positivity calling. Threshold method applied per marker to the
# per-cell mean intensity. Positivity markers = all measured markers EXCEPT the
# nuclear anchor (DAPI, positive by construction) and fiber_markers.
# ---------------------------------------------------------------------------
positivity:
  method: otsu          # otsu | triangle | percentile | gmm
  percentile: 99.0      # cutoff percentile when method == percentile
  min_cells: 30         # skip thresholding a marker/panel with fewer cells than this

# ---------------------------------------------------------------------------
# Stage 7 — phenotyping. Optional named phenotype rules mapping marker-positivity
# logic to a label; left empty for now (co-expression cross-tabs are always produced).
# Example rule:  {name: "DC (CD11c+CD207+)", all_of: [CD11c, CD207]}
# ---------------------------------------------------------------------------
phenotype:
  rules: []

# ---------------------------------------------------------------------------
# Stage 8 — nerve (PGP9.5) analysis. PGP9.5 is fiber-like, measured as area/coverage
# (and optional skeleton length/branches), NOT counted as cells. Panel B fields only.
# ---------------------------------------------------------------------------
nerve:
  marker: PGP9.5
  threshold_method: otsu    # otsu | triangle
  smooth_sigma: 1.0         # Gaussian smoothing (px) before thresholding
  min_object_px: 30         # remove nerve-mask specks smaller than this
  skeleton: true            # skeleton length + branch count (uses skan if available)

# ---------------------------------------------------------------------------
# Stage 9 — immune–nerve spatial analysis. Distances are in PIXELS until pixel size
# is known (plan Sec.7 Q2). `run_squidpy` adds neighborhood-enrichment vs a permutation
# null (a valid internal test given there is no control group).
# ---------------------------------------------------------------------------
spatial:
  association_distance_px: 20   # cells within this distance of nerve = "nerve-associated"
  run_squidpy: true
  n_neighs: 6                   # KNN for the spatial neighborhood graph

# ---------------------------------------------------------------------------
# Stage 10 — aggregation & (descriptive) statistics. There is no control group
# (all images are CFA), so this is DESCRIPTIVE, not between-group: per-image /
# per-sample summaries with dispersion, plus internal tests (marker+ vs marker-
# distance-to-nerve) that need no second condition. Field is 1024x1024 px.
# ---------------------------------------------------------------------------
stats:
  replicate_level: sample       # unit for dispersion (sample = CFA 1/1.1/1.2/X; refine via manifest 'animal')
  distance_test: mannwhitney    # exploratory cell-level test for marker+ vs marker- distance-to-nerve

# Stage 11 — report output directory.
report:
  dir: "outputs/report"
